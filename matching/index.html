<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>マッチングネットワーク スミスチャート | RF計算ツール</title>
<style>
:root {
  --primary: #1a6fa8;
  --primary-dark: #145a8a;
  --accent: #e67e22;
  --accent2: #d75f0f;
  --bg: #f0f4f8;
  --card: #ffffff;
  --border: #c8d6e5;
  --text: #2d3748;
  --muted: #718096;
  --radius: 8px;
}
body.dark {
  --primary: #60a5fa;
  --primary-dark: #3b82f6;
  --accent: #fb923c;
  --accent2: #fb923c;
  --bg: #0f172a;
  --card: #1e293b;
  --border: #334155;
  --text: #e2e8f0;
  --muted: #94a3b8;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); font-size: 14px; }

header {
  background: var(--primary); color: #fff;
  padding: 12px 20px; display: flex; align-items: center; gap: 12px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.15); flex-wrap: wrap;
}
.header-title { flex: 1; min-width: 0; }
.header-title h1 { font-size: 17px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.header-title .subtitle { font-size: 10px; opacity: 0.75; margin-top: 1px; font-family: monospace; }
.back-link {
  font-size: 12px; color: rgba(255,255,255,0.9); text-decoration: none;
  border: 1px solid rgba(255,255,255,0.4); padding: 5px 10px; border-radius: 4px; white-space: nowrap; flex-shrink: 0;
}
.back-link:hover { background: rgba(255,255,255,0.15); }
#dark-toggle {
  flex-shrink: 0; padding: 6px 14px; border-radius: 20px;
  border: 1px solid rgba(255,255,255,0.3); background: transparent;
  color: #fff; cursor: pointer; font-size: 12px; font-weight: 600;
}
body.dark header { background: #1e3a5f; }

.container { max-width: 1100px; margin: 0 auto; padding: 16px; }
.main-layout { display: flex; gap: 16px; align-items: flex-start; flex-wrap: wrap; }
.chart-panel { flex: 0 0 auto; width: 460px; max-width: 100%; }
.controls-panel { flex: 1; min-width: 280px; }

.smith-wrap { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 10px; }
#smith-svg { width: 100%; height: auto; display: block; border-radius: 6px; }
body.dark #smith-svg { filter: brightness(0.82) contrast(1.08); }

/* Trace toggle bar below chart */
.trace-bar {
  display: flex; flex-wrap: wrap; gap: 5px; padding: 6px 0 2px;
}
.trace-check {
  display: flex; align-items: center; gap: 4px; font-size: 11px; cursor: pointer;
  padding: 3px 7px; border-radius: 4px; border: 1px solid var(--border); background: var(--bg); user-select: none;
}
.trace-check input { width: 12px; height: 12px; flex-shrink: 0; accent-color: var(--primary); }
.tdot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

/* Circuit SVG */
.circuit-wrap { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 8px 10px; margin-top: 8px; }
#circuit-svg { width: 100%; height: auto; display: block; }

.result-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 8px; margin-top: 10px; }
.result-item { background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 8px 10px; text-align: center; }
.result-item .rlabel { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 3px; }
.result-item .rvalue { font-size: 15px; font-weight: 700; color: var(--primary); font-family: monospace; }
.result-item .runit  { font-size: 10px; color: var(--muted); margin-top: 1px; }
.result-item.hi { border-color: var(--accent); }
.result-item.hi .rvalue { color: var(--accent); }
body.dark .result-item { background: #0b1220; }
body.dark .result-item.hi { background: #1c1008; }

.card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; margin-bottom: 10px; }
.card h3 {
  font-size: 12px; font-weight: 700; color: var(--primary);
  margin-bottom: 10px; padding-bottom: 6px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 6px;
}
.card-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }

.ctrl-row { margin-bottom: 8px; }
.ctrl-row:last-child { margin-bottom: 0; }
.ctrl-label { display: flex; align-items: center; margin-bottom: 3px; }
.ctrl-label .clname { font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.4px; }

/* Slider + value inline */
.slider-row { display: flex; align-items: center; gap: 8px; }
.slider-row input[type="range"] { flex-shrink: 0; }
.ctrl-val { font-size: 12px; font-weight: 700; color: var(--primary); font-family: monospace; background: var(--bg); padding: 1px 6px; border-radius: 4px; border: 1px solid var(--border); white-space: nowrap; }

input[type="range"] { width: 50%; height: 4px; accent-color: var(--primary); cursor: pointer; display: block; }
input[type="range"]:disabled { opacity: 0.35; cursor: default; }
.sub-info { font-size: 10px; color: var(--muted); font-family: monospace; }

.num-input {
  padding: 3px 7px; border: 1px solid var(--border); border-radius: 4px;
  font-size: 12px; font-family: monospace; font-weight: 700;
  color: var(--primary); background: var(--bg);
}
.num-input:focus { outline: none; border-color: var(--primary); background: var(--card); }
body.dark .num-input { background: #0b1220; }

.input-row { display: flex; align-items: center; gap: 6px; margin-top: 4px; flex-wrap: wrap; }
.input-row .unit { font-size: 11px; color: var(--muted); }

/* Cap range spinners */
.minmax-row { display: flex; align-items: center; gap: 5px; margin-bottom: 8px; flex-wrap: wrap; }
.minmax-row .clname { font-size: 10px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.4px; }
.cap-spin { display: flex; align-items: center; gap: 2px; }
.cap-spin-val {
  font-size: 12px; font-family: monospace; font-weight: 700; color: var(--primary);
  background: var(--bg); padding: 2px 5px; border-radius: 4px; border: 1px solid var(--border);
  min-width: 44px; text-align: center;
}
.spin-btns { display: flex; flex-direction: column; gap: 1px; }
.spin-btn {
  padding: 0 5px; height: 11px; border: 1px solid var(--border); border-radius: 2px;
  background: var(--bg); color: var(--muted); font-size: 8px; cursor: pointer; line-height: 1;
  display: flex; align-items: center; justify-content: center;
}
.spin-btn:hover { background: var(--primary); color: #fff; border-color: var(--primary); }
body.dark .cap-spin-val { background: #0b1220; }

.reset-btn {
  padding: 4px 10px; border-radius: 4px; border: 1px solid var(--border);
  background: var(--bg); color: var(--primary); font-size: 11px; font-weight: 700;
  cursor: pointer; transition: all 0.15s;
}
.reset-btn:hover { background: var(--primary); color: #fff; border-color: var(--primary); }

.radio-group { display: flex; gap: 14px; flex-wrap: wrap; }
.radio-group label { display: flex; align-items: center; gap: 5px; font-size: 12px; font-weight: 600; cursor: pointer; }
.radio-group input[type="radio"] { accent-color: var(--primary); width: 14px; height: 14px; }
.check-row { display: flex; align-items: center; gap: 6px; font-size: 12px; cursor: pointer; margin-top: 6px; }
.check-row input[type="checkbox"] { accent-color: var(--primary); width: 14px; height: 14px; flex-shrink: 0; }

.freq-display { font-size: 14px; font-weight: 700; color: var(--accent); font-family: monospace; margin-top: 3px; }

#area-hull { cursor: pointer; transition: fill 0.12s, stroke 0.12s; }

@media (max-width: 560px) {
  .chart-panel { width: 100%; }
  .controls-panel { min-width: 100%; }
  .result-grid { grid-template-columns: repeat(2, 1fr); }
  header h1 { font-size: 14px; }
  .header-title .subtitle { display: none; }
  .num-input { min-height: 38px; font-size: 15px; }
}
</style>
</head>
<body>

<header>
  <a class="back-link" href="../index.html">← RF計算ツール</a>
  <div class="header-title">
    <h1>マッチングネットワーク スミスチャート</h1>
    <div class="subtitle" id="header-subtitle">[PA] ─ 同軸(50Ω) ─ C2(直列) ─┬─ C1(並列) ─┬─ ダミーロード(50Ω)</div>
  </div>
  <button id="dark-toggle" onclick="toggleDark()">🌙 ダーク</button>
</header>

<div class="container">
  <div class="main-layout">

    <!-- ===== Smith Chart Panel ===== -->
    <div class="chart-panel">
      <div class="smith-wrap">
        <svg id="smith-svg" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <clipPath id="smith-clip">
              <circle cx="250" cy="250" r="215"/>
            </clipPath>
          </defs>
          <rect id="svg-bg" width="500" height="500" fill="white" rx="6"/>
          <g clip-path="url(#smith-clip)">
            <circle cx="321.67" cy="250" r="143.33" fill="none" stroke="#ccc" stroke-width="0.7"/>
            <circle cx="357.5"  cy="250" r="107.5"  fill="none" stroke="#888" stroke-width="1.2"/>
            <circle cx="393.33" cy="250" r="71.67"  fill="none" stroke="#ccc" stroke-width="0.7"/>
            <circle cx="429.17" cy="250" r="35.83"  fill="none" stroke="#ddd" stroke-width="0.6"/>
            <circle cx="465" cy="-180"  r="430"   fill="none" stroke="#ddd" stroke-width="0.7"/>
            <circle cx="465" cy="680"   r="430"   fill="none" stroke="#ddd" stroke-width="0.7"/>
            <circle cx="465" cy="35"    r="215"   fill="none" stroke="#ddd" stroke-width="0.7"/>
            <circle cx="465" cy="465"   r="215"   fill="none" stroke="#ddd" stroke-width="0.7"/>
            <circle cx="465" cy="142.5" r="107.5" fill="none" stroke="#ddd" stroke-width="0.7"/>
            <circle cx="465" cy="357.5" r="107.5" fill="none" stroke="#ddd" stroke-width="0.7"/>
            <circle cx="465" cy="207"   r="43"    fill="none" stroke="#ddd" stroke-width="0.6"/>
            <circle cx="465" cy="293"   r="43"    fill="none" stroke="#ddd" stroke-width="0.6"/>
            <line x1="35" y1="250" x2="465" y2="250" stroke="#bbb" stroke-width="0.8"/>
          </g>
          <circle cx="250" cy="250" r="215" fill="none" stroke="#555" stroke-width="1.5"/>
          <circle cx="250" cy="250" r="2.5" fill="#aaa"/>
          <text x="35"    y="244" text-anchor="middle" fill="#888" font-size="9" font-family="sans-serif">0</text>
          <text x="178.3" y="244" text-anchor="middle" fill="#888" font-size="9" font-family="sans-serif">0.5</text>
          <text x="250"   y="244" text-anchor="middle" fill="#888" font-size="9" font-family="sans-serif">1</text>
          <text x="321.7" y="244" text-anchor="middle" fill="#888" font-size="9" font-family="sans-serif">2</text>
          <text x="393.3" y="244" text-anchor="middle" fill="#888" font-size="9" font-family="sans-serif">5</text>
          <text x="256"  y="30"  text-anchor="start" fill="#aaa" font-size="8" font-family="sans-serif">+j1</text>
          <text x="256"  y="477" text-anchor="start" fill="#aaa" font-size="8" font-family="sans-serif">−j1</text>
          <text x="105"  y="72"  text-anchor="end"   fill="#aaa" font-size="8" font-family="sans-serif">+j0.5</text>
          <text x="105"  y="435" text-anchor="end"   fill="#aaa" font-size="8" font-family="sans-serif">−j0.5</text>
          <text x="390"  y="72"  text-anchor="start" fill="#aaa" font-size="8" font-family="sans-serif">+j2</text>
          <text x="390"  y="435" text-anchor="start" fill="#aaa" font-size="8" font-family="sans-serif">−j2</text>
          <text x="454"  y="166" text-anchor="start" fill="#aaa" font-size="8" font-family="sans-serif">+j5</text>
          <text x="454"  y="338" text-anchor="start" fill="#aaa" font-size="8" font-family="sans-serif">−j5</text>
          <text x="250" y="14" text-anchor="middle" fill="#1a6fa8" font-size="11" font-weight="bold" font-family="sans-serif">Smith Chart  (Z₀ = 50Ω)</text>

          <!-- Dynamic elements -->
          <path id="area-hull" clip-path="url(#smith-clip)"
                fill="rgba(60,180,100,0.13)" stroke="rgba(60,180,100,0.5)"
                stroke-width="1" stroke-dasharray="4,2"/>
          <path id="trace-cable" fill="none" stroke="rgba(140,140,160,0.45)" stroke-width="1.4" stroke-dasharray="5,3"/>
          <path id="trace-c1"    fill="none" stroke="rgba(0,155,210,0.55)"   stroke-width="1.8"/>
          <path id="trace-c2"    fill="none" stroke="rgba(215,95,15,0.55)"   stroke-width="1.8"/>
          <circle id="c1-marker" cx="-200" cy="-200" r="5.5" fill="rgba(0,155,210,0.9)"  stroke="white" stroke-width="1.5"/>
          <circle id="c2-marker" cx="-200" cy="-200" r="5.5" fill="rgba(215,95,15,0.9)"  stroke="white" stroke-width="1.5"/>
          <line id="ch-v" x1="0" y1="0" x2="0" y2="0" stroke="rgba(230,126,34,0.3)" stroke-width="0.8" stroke-dasharray="4,3"/>
          <line id="ch-h" x1="0" y1="0" x2="0" y2="0" stroke="rgba(230,126,34,0.3)" stroke-width="0.8" stroke-dasharray="4,3"/>
          <circle id="op-point" cx="250" cy="250" r="8" fill="#e67e22" stroke="white" stroke-width="2"/>
          <text id="op-label" x="260" y="238" fill="#2d3748" font-size="10" font-weight="bold" font-family="monospace"></text>
        </svg>

        <!-- Trace toggles: compact bar under chart -->
        <div class="trace-bar">
          <label class="trace-check">
            <input type="checkbox" id="tr-area" checked onchange="update()">
            <span class="tdot" style="background:#3cb464;opacity:0.75"></span>エリア
          </label>
          <label class="trace-check">
            <input type="checkbox" id="tr-c1" checked onchange="update()">
            <span class="tdot" style="background:#009bd2"></span>C1
          </label>
          <label class="trace-check">
            <input type="checkbox" id="tr-c2" checked onchange="update()">
            <span class="tdot" style="background:#d75f0f"></span>C2
          </label>
          <label class="trace-check">
            <input type="checkbox" id="tr-cable" checked onchange="update()">
            <span class="tdot" style="background:#888"></span>同軸
          </label>
        </div>
      </div>

      <!-- Circuit diagram -->
      <div class="circuit-wrap">
        <svg id="circuit-svg" viewBox="0 0 380 82" xmlns="http://www.w3.org/2000/svg"></svg>
      </div>

      <!-- Numeric results -->
      <div class="result-grid">
        <div class="result-item hi">
          <div class="rlabel">Z_PA</div>
          <div class="rvalue" id="res-z">—</div>
          <div class="runit">Ω</div>
        </div>
        <div class="result-item">
          <div class="rlabel">|Γ|</div>
          <div class="rvalue" id="res-gmag">—</div>
        </div>
        <div class="result-item">
          <div class="rlabel">∠Γ</div>
          <div class="rvalue" id="res-gang">—</div>
          <div class="runit">°</div>
        </div>
        <div class="result-item">
          <div class="rlabel">VSWR</div>
          <div class="rvalue" id="res-vswr">—</div>
        </div>
        <div class="result-item">
          <div class="rlabel">反射損失</div>
          <div class="rvalue" id="res-rl">—</div>
          <div class="runit">dB</div>
        </div>
      </div>
    </div>

    <!-- ===== Controls Panel ===== -->
    <div class="controls-panel">

      <!-- ===== Topology ===== -->
      <div class="card">
        <h3>回路トポロジー</h3>
        <div class="radio-group" style="flex-direction:column; gap:8px;">
          <label><input type="radio" name="topology" value="A" checked onchange="update()"> A: 同軸 → C2(直列) → C1∥ダミー</label>
          <label><input type="radio" name="topology" value="B" onchange="update()"> B: 同軸 → C1∥(C2＋ダミー)</label>
        </div>
      </div>

      <!-- ===== Frequency ===== -->
      <div class="card">
        <h3>周波数設定</h3>
        <div class="ctrl-row">
          <div style="display:flex; align-items:center; gap:10px; flex-wrap:wrap;">
            <div class="radio-group">
              <label><input type="radio" name="fcenter" value="27.12" checked onchange="onFcenterChange()"> 27.12 MHz</label>
              <label><input type="radio" name="fcenter" value="12.88" onchange="onFcenterChange()"> 12.88 MHz</label>
            </div>
            <button class="reset-btn" onclick="resetFreq()">リセット</button>
          </div>
        </div>
        <div class="ctrl-row" style="margin-top:8px;">
          <div class="ctrl-label">
            <span class="clname">オフセット</span>
          </div>
          <div class="slider-row">
            <input type="range" id="sl-offset" min="-10" max="10" step="1" value="0" oninput="onOffsetSlider()">
            <span class="ctrl-val" id="disp-offset">+0%</span>
          </div>
          <div class="input-row" style="margin-top:5px;">
            <input type="number" id="in-freq" class="num-input" style="width:80px;" step="0.01" oninput="onFreqInput()">
            <span class="unit">MHz</span>
            <span class="freq-display" id="disp-freq" style="font-size:12px;"></span>
          </div>
        </div>
      </div>

      <!-- ===== Cable ===== -->
      <div class="card">
        <h3>同軸ケーブル</h3>
        <div class="ctrl-row">
          <div class="ctrl-label">
            <span class="clname">ケーブル長</span>
          </div>
          <div class="slider-row">
            <!-- step=1 → 1/16λ per step; max=16 → 1λ -->
            <input type="range" id="sl-cable" min="0" max="16" step="1" value="2" oninput="onCableSlider()">
            <span class="ctrl-val" id="disp-cable">0/16λ</span>
          </div>
          <div class="input-row" style="margin-top:5px;">
            <input type="number" id="in-cable-m" class="num-input" style="width:80px;" step="0.001" min="0" oninput="onCableMeterInput()">
            <span class="unit">m</span>
            <span class="sub-info" id="disp-cable-deg">/  0.0°</span>
          </div>
        </div>
        <div class="ctrl-row">
          <div class="ctrl-label">
            <span class="clname">速度係数 VF</span>
          </div>
          <div class="slider-row">
            <input type="range" id="sl-vf" min="50" max="95" step="1" value="66" oninput="update()">
            <span class="ctrl-val" id="disp-vf">0.66</span>
          </div>
        </div>
      </div>

      <!-- ===== C1 ===== -->
      <div class="card">
        <h3><span class="card-dot" style="background:#009bd2"></span> C1（並列コンデンサ）</h3>
        <div class="minmax-row">
          <span class="clname">範囲</span>
          <div class="cap-spin">
            <span class="cap-spin-val" id="in-c1min-val">10</span>
            <div class="spin-btns">
              <button class="spin-btn" onclick="stepCap('c1min',+1)">▲</button>
              <button class="spin-btn" onclick="stepCap('c1min',-1)">▼</button>
            </div>
          </div>
          <span class="unit">〜</span>
          <div class="cap-spin">
            <span class="cap-spin-val" id="in-c1max-val">470</span>
            <div class="spin-btns">
              <button class="spin-btn" onclick="stepCap('c1max',+1)">▲</button>
              <button class="spin-btn" onclick="stepCap('c1max',-1)">▼</button>
            </div>
          </div>
          <span class="unit">pF</span>
        </div>
        <div class="ctrl-row">
          <div class="ctrl-label">
            <span class="clname">C1</span>
          </div>
          <div class="slider-row">
            <input type="range" id="sl-c1" min="0" max="100" step="1" value="60" oninput="update()">
            <span class="ctrl-val" id="disp-c1">—</span>
          </div>
        </div>
        <label class="check-row">
          <input type="checkbox" id="ck-c1-open" onchange="update()">
          C1 = 0（オープン：コンデンサなし）
        </label>
      </div>

      <!-- ===== C2 ===== -->
      <div class="card">
        <h3><span class="card-dot" style="background:#d75f0f"></span> C2（直列コンデンサ）</h3>
        <div class="minmax-row">
          <span class="clname">範囲</span>
          <div class="cap-spin">
            <span class="cap-spin-val" id="in-c2min-val">10</span>
            <div class="spin-btns">
              <button class="spin-btn" onclick="stepCap('c2min',+1)">▲</button>
              <button class="spin-btn" onclick="stepCap('c2min',-1)">▼</button>
            </div>
          </div>
          <span class="unit">〜</span>
          <div class="cap-spin">
            <span class="cap-spin-val" id="in-c2max-val">470</span>
            <div class="spin-btns">
              <button class="spin-btn" onclick="stepCap('c2max',+1)">▲</button>
              <button class="spin-btn" onclick="stepCap('c2max',-1)">▼</button>
            </div>
          </div>
          <span class="unit">pF</span>
        </div>
        <div class="ctrl-row">
          <div class="ctrl-label">
            <span class="clname">C2</span>
          </div>
          <div class="slider-row">
            <input type="range" id="sl-c2" min="0" max="100" step="1" value="60" oninput="update()">
            <span class="ctrl-val" id="disp-c2">—</span>
          </div>
        </div>
        <label class="check-row">
          <input type="checkbox" id="ck-c2-short" onchange="update()">
          C2 = ∞（ショート：C2なし・ゼロΩ）
        </label>
      </div>

    </div><!-- /controls-panel -->
  </div><!-- /main-layout -->
</div><!-- /container -->

<script>
// ============================================================
// Complex number library
// ============================================================
const C = {
  add: (a, b) => ({ re: a.re + b.re, im: a.im + b.im }),
  sub: (a, b) => ({ re: a.re - b.re, im: a.im - b.im }),
  mul: (a, b) => ({ re: a.re*b.re - a.im*b.im, im: a.re*b.im + a.im*b.re }),
  div: (a, b) => {
    const d = b.re*b.re + b.im*b.im;
    if (d < 1e-30) return { re: 1e9, im: 0 };
    return { re: (a.re*b.re + a.im*b.im) / d, im: (a.im*b.re - a.re*b.im) / d };
  },
  r: (x) => ({ re: x, im: 0 }),
};

const Z0 = 50;

// ============================================================
// Cap range state (discrete steps: 10, 100, 200, …, 1000)
// ============================================================
const CAP_STEPS = [10, 100, 200, 300, 400, 500, 600, 700, 800, 900, 1000];
const capState = { c1min: 10, c1max: 470, c2min: 10, c2max: 470 };

function stepCap(key, dir) {
  const cur = capState[key];
  let next;
  if (dir > 0) {
    next = CAP_STEPS.find(s => s > cur);
    if (next === undefined) next = CAP_STEPS[CAP_STEPS.length - 1];
  } else {
    const rev = [...CAP_STEPS].reverse();
    next = rev.find(s => s < cur);
    if (next === undefined) next = CAP_STEPS[0];
  }
  if (key === 'c1min' && next >= capState.c1max) return;
  if (key === 'c1max' && next <= capState.c1min) return;
  if (key === 'c2min' && next >= capState.c2max) return;
  if (key === 'c2max' && next <= capState.c2min) return;
  capState[key] = next;
  document.getElementById('in-' + key + '-val').textContent = next;
  update();
}

// ============================================================
// Impedance calculation
// ============================================================
function computeZPA(freqHz, c1pF, c1open, c2pF, c2short, cableLam, topo, fCenterHz) {
  const w = 2 * Math.PI * freqHz;
  const Zload = { re: 50, im: 0 };
  let Zmatch;

  if (topo === 'B') {
    let Zinner;
    if (c2short) {
      Zinner = Zload;
    } else {
      const ZC2 = { re: 0, im: -1 / (w * c2pF * 1e-12) };
      Zinner = C.add(Zload, ZC2);
    }
    if (c1open) {
      Zmatch = Zinner;
    } else {
      const ZC1 = { re: 0, im: -1 / (w * c1pF * 1e-12) };
      Zmatch = C.div(C.mul(Zinner, ZC1), C.add(Zinner, ZC1));
    }
  } else {
    let Z1;
    if (c1open) {
      Z1 = Zload;
    } else {
      const ZC1 = { re: 0, im: -1 / (w * c1pF * 1e-12) };
      Z1 = C.div(C.mul(Zload, ZC1), C.add(Zload, ZC1));
    }
    if (c2short) {
      Zmatch = Z1;
    } else {
      const ZC2 = { re: 0, im: -1 / (w * c2pF * 1e-12) };
      Zmatch = C.add(Z1, ZC2);
    }
  }

  const betaL = 2 * Math.PI * cableLam * (freqHz / fCenterHz);
  const tanBL = Math.tan(betaL);
  if (Math.abs(tanBL) > 1e7) return C.div(C.r(Z0 * Z0), Zmatch);
  const jZ0t = { re: 0, im: Z0 * tanBL };
  const jZmt = { re: -Zmatch.im * tanBL, im: Zmatch.re * tanBL };
  return C.div(C.mul(C.r(Z0), C.add(Zmatch, jZ0t)), C.add(C.r(Z0), jZmt));
}

function zToGamma(zRe, zIm) {
  const nRe = zRe - Z0, nIm = zIm;
  const dRe = zRe + Z0, dIm = zIm;
  const d = dRe*dRe + dIm*dIm;
  if (d < 1e-20) return { re: 1, im: 0 };
  return { re: (nRe*dRe + nIm*dIm) / d, im: (nIm*dRe - nRe*dIm) / d };
}

// ============================================================
// SVG helpers
// ============================================================
const CX = 250, CY = 250, R = 215;

function gToSVG(gr, gi) {
  const mag = Math.sqrt(gr*gr + gi*gi);
  if (mag > 1.5) { gr = gr/mag*1.5; gi = gi/mag*1.5; }
  return [CX + gr * R, CY - gi * R];
}

function pointsToPath(pts, closed) {
  if (!pts.length) return '';
  let d = `M${pts[0][0].toFixed(1)},${pts[0][1].toFixed(1)}`;
  for (let i = 1; i < pts.length; i++) d += ` L${pts[i][0].toFixed(1)},${pts[i][1].toFixed(1)}`;
  if (closed) d += ' Z';
  return d;
}

function svgEl(id) { return document.getElementById(id); }
function setAttr(el, attrs) { for (const [k, v] of Object.entries(attrs)) el.setAttribute(k, v); }

// ============================================================
// Capacitor slider helpers
// ============================================================
function slToCap(val, cMin, cMax) {
  if (cMin >= cMax) return cMin;
  return cMin * Math.pow(cMax / cMin, val / 100);
}
function fmtCap(pF) {
  if (pF < 9.995)  return pF.toFixed(2) + ' pF';
  if (pF < 99.95)  return pF.toFixed(1) + ' pF';
  if (pF < 999.5)  return pF.toFixed(0) + ' pF';
  return (pF / 1000).toFixed(3) + ' nF';
}
function fmtZ(re, im) {
  const sign = im >= 0 ? '+j' : '−j';
  return re.toFixed(1) + ' ' + sign + Math.abs(im).toFixed(1);
}

// ============================================================
// Convex hull (Andrew's monotone chain)
// ============================================================
function convexHull(pts) {
  if (pts.length < 3) return pts.slice();
  const sorted = pts.slice().sort((a, b) => a[0] !== b[0] ? a[0] - b[0] : a[1] - b[1]);
  const n = sorted.length;
  function cross(O, A, B) {
    return (A[0]-O[0])*(B[1]-O[1]) - (A[1]-O[1])*(B[0]-O[0]);
  }
  const lower = [], upper = [];
  for (const p of sorted) {
    while (lower.length >= 2 && cross(lower[lower.length-2], lower[lower.length-1], p) <= 0) lower.pop();
    lower.push(p);
  }
  for (let i = n-1; i >= 0; i--) {
    const p = sorted[i];
    while (upper.length >= 2 && cross(upper[upper.length-2], upper[upper.length-1], p) <= 0) upper.pop();
    upper.push(p);
  }
  upper.pop(); lower.pop();
  return lower.concat(upper);
}

// ============================================================
// State helpers
// ============================================================
function getTopology() { return document.querySelector('input[name="topology"]:checked').value; }
function getFcenter()  { return parseFloat(document.querySelector('input[name="fcenter"]:checked').value); }
function getOffsetPct(){ return parseInt(svgEl('sl-offset').value); }
function getFreqHz()   { return getFcenter() * (1 + getOffsetPct() / 100) * 1e6; }
function getVf()       { return parseInt(svgEl('sl-vf').value) / 100; }
function getLambdaM(f, vf) { return (3e8 * vf) / f; }
function getCableLam() { return parseInt(svgEl('sl-cable').value) / 16; }

// ============================================================
// Event handlers
// ============================================================
function onFcenterChange() {
  svgEl('sl-offset').value = 0;
  svgEl('in-freq').value = getFcenter().toFixed(3);
  update();
}
function resetFreq() {
  svgEl('sl-offset').value = 0;
  svgEl('in-freq').value = getFcenter().toFixed(3);
  update();
}
function onOffsetSlider() {
  const fc = getFcenter(), off = getOffsetPct();
  svgEl('in-freq').value = (fc * (1 + off / 100)).toFixed(3);
  update();
}
function onFreqInput() {
  const fc = getFcenter();
  const freqMHz = parseFloat(svgEl('in-freq').value);
  if (isNaN(freqMHz) || freqMHz <= 0) return;
  const offset = Math.round((freqMHz / fc - 1) * 100);
  svgEl('sl-offset').value = Math.max(-10, Math.min(10, offset));
  update();
}
function onCableSlider() {
  const fCenterHz = getFcenter() * 1e6, vf = getVf();
  svgEl('in-cable-m').value = (getCableLam() * getLambdaM(fCenterHz, vf)).toFixed(3);
  update();
}
function onCableMeterInput() {
  const cableM = parseFloat(svgEl('in-cable-m').value);
  if (isNaN(cableM) || cableM < 0) return;
  const lambdaM = getLambdaM(getFcenter() * 1e6, getVf());
  const steps = Math.max(0, Math.min(16, Math.round((cableM / lambdaM) * 16)));
  svgEl('sl-cable').value = steps;
  update();
}

// ============================================================
// Circuit diagram (viewBox 380×82, cy=34)
// Wider, bigger components, better spacing. Load at far right.
// ============================================================
function drawCircuit(topo, freqMHz, cableM, vf, c1pF, c1open, c2pF, c2short) {
  const el = svgEl('circuit-svg');
  const t  = 'var(--text)';
  const ac = 'var(--accent2)';
  const ff = "'Space Mono',monospace";

  const wire   = (x1,y1,x2,y2) => `<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="${t}" stroke-width="2"/>`;
  // Bigger capacitor plates: ±11 height (was ±9), wider gap = 5px
  const serCap = (cx,cy) => `<line x1="${cx-2.5}" y1="${cy-11}" x2="${cx-2.5}" y2="${cy+11}" stroke="${t}" stroke-width="2.5"/><line x1="${cx+2.5}" y1="${cy-11}" x2="${cx+2.5}" y2="${cy+11}" stroke="${t}" stroke-width="2.5"/>`;
  const shCap  = (jx,yt,yb) => `<line x1="${jx-10}" y1="${yt}" x2="${jx+10}" y2="${yt}" stroke="${t}" stroke-width="2.2"/><line x1="${jx-10}" y1="${yb}" x2="${jx+10}" y2="${yb}" stroke="${t}" stroke-width="2.2"/>`;
  const gnd    = (x,y) => `<line x1="${x-9}" y1="${y}" x2="${x+9}" y2="${y}" stroke="${t}" stroke-width="2"/><line x1="${x-5.5}" y1="${y+4}" x2="${x+5.5}" y2="${y+4}" stroke="${t}" stroke-width="1.5"/><line x1="${x-2}" y1="${y+8}" x2="${x+2}" y2="${y+8}" stroke="${t}" stroke-width="1.5"/>`;
  const port   = (cx,cy) => `<circle cx="${cx}" cy="${cy}" r="7" fill="none" stroke="${t}" stroke-width="2"/>`;
  const dot    = (cx,cy) => `<circle cx="${cx}" cy="${cy}" r="3" fill="${t}"/>`;
  const lbl    = (x,y,anc,str,fs) => `<text x="${x}" y="${y}" text-anchor="${anc}" font-size="${fs||10}" fill="${ac}" font-family="${ff}">${str}</text>`;
  const valtxt = (x,y,anc,str) => `<text x="${x}" y="${y}" text-anchor="${anc}" font-size="9" fill="${t}" font-family="${ff}" opacity="0.9">${str}</text>`;
  const box    = (x1,y1,w,h,label) => `<rect x="${x1}" y="${y1}" width="${w}" height="${h}" fill="none" stroke="${t}" stroke-width="2"/><text x="${x1+w/2}" y="${y1+h/2+4}" text-anchor="middle" font-size="10" fill="${t}" font-family="${ff}">${label}</text>`;

  const freqStr  = freqMHz.toFixed(2) + 'MHz';
  const cableStr = cableM.toFixed(2) + 'm';
  const vfStr    = 'VF=' + vf.toFixed(2);
  const c1Str    = c1open  ? 'open'  : fmtCap(c1pF).replace(' ', '');
  const c2Str    = c2short ? 'short' : fmtCap(c2pF).replace(' ', '');

  let s = '';
  const cy = 34; // horizontal centerline

  // C1 shunt: hangs down from (jx,cy), label+value to RIGHT of GND stem
  const drawC1shunt = (jx) => {
    s += wire(jx, cy, jx, cy+13);       // lead down to plates
    s += shCap(jx, cy+15, cy+22);      // two plates (gap=7)
    s += wire(jx, cy+22, jx, cy+30);   // stem below plates
    s += gnd(jx, cy+30);               // GND bars at cy+30, cy+34, cy+38
    // label + value to the right, beside GND
    s += lbl(jx+14, cy+30, 'start', 'C₁', 10);     // baseline=cy+30 = beside top gnd bar
    s += valtxt(jx+14, cy+41, 'start', c1Str);      // baseline=cy+41 (below lowest gnd bar cy+38+small)
  };

  // PA port at x=22
  s += port(22, cy);
  s += lbl(22, 18, 'middle', 'PA', 10);             // above (port top=cy-7=27, baseline=18 → bbox.y=9)
  s += valtxt(22, 54, 'middle', freqStr);            // below (port bottom=cy+7=41, baseline=54 → bbox.y=46 ✓)

  // Wire PA→Coax
  s += wire(29, cy, 48, cy);

  // Coax box: x=48–128 (w=80, h=18, cy±9)
  s += `<rect x="48" y="${cy-9}" width="80" height="18" fill="none" stroke="${t}" stroke-width="2"/>`;
  s += valtxt(88, cy-1,  'middle', '同軸');          // upper inside
  s += valtxt(88, cy+8,  'middle', cableStr);        // lower inside
  s += valtxt(88, cy-13, 'middle', vfStr);           // above box (box top=cy-9=25, baseline=cy-13=21 → bbox.y=13 ✓)

  if (topo === 'A') {
    // coax(128) → wire → C2(cx=142) → wire → junction(x=162) → long wire → Load(x=298-370)
    const jx = 162;
    s += wire(128, cy, 137, cy);
    s += serCap(140, cy);
    s += lbl(140, cy-15, 'middle', 'C₂', 10);       // above plates (plates top=cy-11=23; baseline=cy-15=19 → gap 4)
    s += valtxt(140, cy+15, 'middle', c2Str);        // below plates (plates bot=cy+11=45; baseline=cy+15=49→bbox.y=41 ✓)
    s += wire(143, cy, jx, cy);
    s += dot(jx, cy);
    s += wire(jx, cy, 298, cy);
    s += box(298, cy-9, 72, 18, '50Ω');
    drawC1shunt(jx);
  } else {
    // coax(128) → wire → junction(x=148) → wire → C2(cx=162) → wire → Load(x=298-370)
    const jx = 148;
    s += wire(128, cy, jx, cy);
    s += dot(jx, cy);
    s += wire(jx, cy, 157, cy);
    s += serCap(160, cy);
    s += lbl(160, cy-15, 'middle', 'C₂', 10);
    s += valtxt(160, cy+15, 'middle', c2Str);
    s += wire(163, cy, 298, cy);
    s += box(298, cy-9, 72, 18, '50Ω');
    drawC1shunt(jx);
  }

  el.innerHTML = s;
}

// ============================================================
// Inverse solve: find nearest (C1, C2) for a Gamma point
// ============================================================
function inverseFromGamma(gr, gi) {
  const freqHz    = getFreqHz();
  const fCenterHz = getFcenter() * 1e6;
  const cableLam  = getCableLam();
  const topo      = getTopology();
  const c1Min = capState.c1min, c1Max = capState.c1max;
  const c2Min = capState.c2min, c2Max = capState.c2max;

  const N = 40;
  let bestDist = Infinity, bestI = 50, bestJ = 50;
  for (let i = 0; i <= N; i++) {
    const c1v = slToCap(i / N * 100, c1Min, c1Max);
    for (let j = 0; j <= N; j++) {
      const c2v = slToCap(j / N * 100, c2Min, c2Max);
      const z = computeZPA(freqHz, c1v, false, c2v, false, cableLam, topo, fCenterHz);
      const g = zToGamma(z.re, z.im);
      const dist = (g.re - gr)*(g.re - gr) + (g.im - gi)*(g.im - gi);
      if (dist < bestDist) { bestDist = dist; bestI = i; bestJ = j; }
    }
  }
  svgEl('sl-c1').value = Math.round(bestI / N * 100);
  svgEl('sl-c2').value = Math.round(bestJ / N * 100);
  svgEl('ck-c1-open').checked  = false;
  svgEl('ck-c2-short').checked = false;
  update();
}

function gammaFromEvent(e) {
  const smithSvg = svgEl('smith-svg');
  const rect = smithSvg.getBoundingClientRect();
  const sx = (e.clientX - rect.left) / rect.width  * 500;
  const sy = (e.clientY - rect.top)  / rect.height * 500;
  return [(sx - CX) / R, -(sy - CY) / R];
}

// ============================================================
// Hull interaction: hover color + click + drag
// ============================================================
const hull = svgEl('area-hull');
let isDragging = false;

hull.addEventListener('mouseenter', () => {
  if (svgEl('tr-area').checked) {
    hull.setAttribute('fill',   'rgba(60,180,100,0.28)');
    hull.setAttribute('stroke', 'rgba(60,180,100,0.85)');
  }
});
hull.addEventListener('mouseleave', () => {
  hull.setAttribute('fill',   'rgba(60,180,100,0.13)');
  hull.setAttribute('stroke', 'rgba(60,180,100,0.5)');
});

hull.addEventListener('mousedown', (e) => {
  if (!svgEl('tr-area').checked) return;
  isDragging = true;
  const [gr, gi] = gammaFromEvent(e);
  inverseFromGamma(gr, gi);
  e.preventDefault();
});

svgEl('smith-svg').addEventListener('mousemove', (e) => {
  if (!isDragging) return;
  const [gr, gi] = gammaFromEvent(e);
  inverseFromGamma(gr, gi);
});

document.addEventListener('mouseup', () => { isDragging = false; });

hull.addEventListener('click', (e) => {
  if (!svgEl('tr-area').checked) return;
  const [gr, gi] = gammaFromEvent(e);
  inverseFromGamma(gr, gi);
  e.stopPropagation();
});

// ============================================================
// Main update
// ============================================================
function update() {
  const topo      = getTopology();
  const fc        = getFcenter();
  const fCenterHz = fc * 1e6;
  const offsetPct = getOffsetPct();
  const freqMHz   = fc * (1 + offsetPct / 100);
  const freqHz    = freqMHz * 1e6;

  const cableSteps = parseInt(svgEl('sl-cable').value);
  const cableLam   = cableSteps / 16;
  const vf         = getVf();

  const c1Min  = capState.c1min, c1Max = capState.c1max;
  const c2Min  = capState.c2min, c2Max = capState.c2max;

  const c1Val   = parseInt(svgEl('sl-c1').value);
  const c1pF    = slToCap(c1Val, c1Min, c1Max);
  const c1open  = svgEl('ck-c1-open').checked;

  const c2Val   = parseInt(svgEl('sl-c2').value);
  const c2pF    = slToCap(c2Val, c2Min, c2Max);
  const c2short = svgEl('ck-c2-short').checked;

  const showArea  = svgEl('tr-area').checked;
  const showC1    = svgEl('tr-c1').checked;
  const showC2    = svgEl('tr-c2').checked;
  const showCable = svgEl('tr-cable').checked;

  // Labels
  svgEl('disp-offset').textContent = (offsetPct >= 0 ? '+' : '') + offsetPct + '%';
  svgEl('disp-freq').textContent   = freqMHz.toFixed(3) + ' MHz';
  svgEl('disp-cable').textContent  = cableSteps + '/16λ  (λ@' + fc.toFixed(2) + 'MHz)';
  svgEl('disp-vf').textContent     = vf.toFixed(2);

  const lambdaM  = getLambdaM(fCenterHz, vf);
  const cableM   = cableLam * lambdaM;
  const cableDeg = cableLam * (freqHz / fCenterHz) * 360;
  svgEl('disp-cable-deg').textContent = '/  ' + cableDeg.toFixed(1) + '°';

  if (document.activeElement !== svgEl('in-cable-m'))
    svgEl('in-cable-m').value = cableM.toFixed(3);
  if (document.activeElement !== svgEl('in-freq'))
    svgEl('in-freq').value = freqMHz.toFixed(3);

  svgEl('disp-c1').textContent = c1open  ? 'オープン' : fmtCap(c1pF);
  svgEl('disp-c2').textContent = c2short ? 'ショート' : fmtCap(c2pF);
  svgEl('sl-c1').disabled = c1open;
  svgEl('sl-c2').disabled = c2short;

  svgEl('header-subtitle').textContent = topo === 'A'
    ? '[PA] ─ 同軸(50Ω) ─ C2(直列) ─┬─ C1(並列) ─┬─ ダミーロード(50Ω)'
    : '[PA] ─ 同軸(50Ω) ─┬─ C1(並列) ─┬─ C2(直列) ─ ダミーロード(50Ω)';

  drawCircuit(topo, freqMHz, cableM, vf, c1pF, c1open, c2pF, c2short);

  // Operating point
  const ZPA   = computeZPA(freqHz, c1pF, c1open, c2pF, c2short, cableLam, topo, fCenterHz);
  const Gamma = zToGamma(ZPA.re, ZPA.im);
  const gMag  = Math.sqrt(Gamma.re*Gamma.re + Gamma.im*Gamma.im);
  const gAng  = Math.atan2(Gamma.im, Gamma.re) * 180 / Math.PI;
  const vswr  = gMag < 0.9999 ? (1 + gMag) / (1 - gMag) : Infinity;
  const rl    = gMag > 1e-9   ? -20 * Math.log10(gMag) : Infinity;

  svgEl('res-z').textContent    = fmtZ(ZPA.re, ZPA.im);
  svgEl('res-gmag').textContent = gMag.toFixed(4);
  svgEl('res-gang').textContent = gAng.toFixed(1);
  svgEl('res-vswr').textContent = isFinite(vswr) ? vswr.toFixed(2) : '∞';
  svgEl('res-rl').textContent   = isFinite(rl)   ? rl.toFixed(1)   : '∞';

  const [px, py] = gToSVG(Gamma.re, Gamma.im);
  setAttr(svgEl('op-point'), { cx: px.toFixed(1), cy: py.toFixed(1) });
  setAttr(svgEl('ch-v'), { x1: px.toFixed(1), y1: CY - R, x2: px.toFixed(1), y2: CY + R });
  setAttr(svgEl('ch-h'), { x1: CX - R, y1: py.toFixed(1), x2: CX + R, y2: py.toFixed(1) });

  const lbl = svgEl('op-label');
  lbl.textContent = fmtZ(ZPA.re, ZPA.im) + ' Ω';
  const lx = px > CX ? px - 10 : px + 10;
  const ly = py > CY ? py - 9  : py + 14;
  setAttr(lbl, { x: lx.toFixed(1), y: ly.toFixed(1), 'text-anchor': px > CX ? 'end' : 'start' });

  // Reachable area — trace 4 boundary edges of (C1,C2) parameter rectangle
  const areaEl = svgEl('area-hull');
  if (showArea) {
    areaEl.removeAttribute('display');
    const NB = 60;
    const bpts = [];
    // Edge 1: C2=min, C1: min→max
    for (let i = 0; i <= NB; i++) {
      const c1v = slToCap(i / NB * 100, c1Min, c1Max);
      const z = computeZPA(freqHz, c1v, false, c2Min, false, cableLam, topo, fCenterHz);
      const g = zToGamma(z.re, z.im); bpts.push(gToSVG(g.re, g.im));
    }
    // Edge 2: C1=max, C2: min→max
    for (let i = 0; i <= NB; i++) {
      const c2v = slToCap(i / NB * 100, c2Min, c2Max);
      const z = computeZPA(freqHz, c1Max, false, c2v, false, cableLam, topo, fCenterHz);
      const g = zToGamma(z.re, z.im); bpts.push(gToSVG(g.re, g.im));
    }
    // Edge 3: C2=max, C1: max→min
    for (let i = NB; i >= 0; i--) {
      const c1v = slToCap(i / NB * 100, c1Min, c1Max);
      const z = computeZPA(freqHz, c1v, false, c2Max, false, cableLam, topo, fCenterHz);
      const g = zToGamma(z.re, z.im); bpts.push(gToSVG(g.re, g.im));
    }
    // Edge 4: C1=min, C2: max→min
    for (let i = NB; i >= 0; i--) {
      const c2v = slToCap(i / NB * 100, c2Min, c2Max);
      const z = computeZPA(freqHz, c1Min, false, c2v, false, cableLam, topo, fCenterHz);
      const g = zToGamma(z.re, z.im); bpts.push(gToSVG(g.re, g.im));
    }
    areaEl.setAttribute('d', pointsToPath(bpts, true));
  } else {
    areaEl.setAttribute('display', 'none');
  }

  // Trajectories
  const N = 120;

  const tc1 = svgEl('trace-c1'), m1 = svgEl('c1-marker');
  if (showC1) {
    tc1.removeAttribute('display');
    const pts = [];
    for (let i = 0; i <= N; i++) {
      const c1v = slToCap(i / N * 100, c1Min, c1Max);
      const z = computeZPA(freqHz, c1v, false, c2pF, c2short, cableLam, topo, fCenterHz);
      pts.push(gToSVG(...Object.values(zToGamma(z.re, z.im))));
    }
    tc1.setAttribute('d', pointsToPath(pts, false));
    if (!c1open) setAttr(m1, { cx: px.toFixed(1), cy: py.toFixed(1), display: '' });
    else         setAttr(m1, { cx: '-200', cy: '-200' });
  } else {
    tc1.setAttribute('display', 'none');
    setAttr(m1, { cx: '-200', cy: '-200' });
  }

  const tc2 = svgEl('trace-c2'), m2 = svgEl('c2-marker');
  if (showC2) {
    tc2.removeAttribute('display');
    const pts = [];
    for (let i = 0; i <= N; i++) {
      const c2v = slToCap(i / N * 100, c2Min, c2Max);
      const z = computeZPA(freqHz, c1pF, c1open, c2v, false, cableLam, topo, fCenterHz);
      pts.push(gToSVG(...Object.values(zToGamma(z.re, z.im))));
    }
    tc2.setAttribute('d', pointsToPath(pts, false));
    if (!c2short) setAttr(m2, { cx: px.toFixed(1), cy: py.toFixed(1), display: '' });
    else          setAttr(m2, { cx: '-200', cy: '-200' });
  } else {
    tc2.setAttribute('display', 'none');
    setAttr(m2, { cx: '-200', cy: '-200' });
  }

  const tcb = svgEl('trace-cable');
  if (showCable) {
    tcb.removeAttribute('display');
    const pts = [];
    for (let i = 0; i <= 100; i++) {
      const z = computeZPA(freqHz, c1pF, c1open, c2pF, c2short, i / 100, topo, fCenterHz);
      pts.push(gToSVG(...Object.values(zToGamma(z.re, z.im))));
    }
    tcb.setAttribute('d', pointsToPath(pts, false));
  } else {
    tcb.setAttribute('display', 'none');
  }
}

// ============================================================
// Dark mode
// ============================================================
let isDark = false;
function toggleDark() {
  isDark = !isDark;
  document.body.classList.toggle('dark', isDark);
  svgEl('dark-toggle').textContent = isDark ? '☀️ ライト' : '🌙 ダーク';
  svgEl('svg-bg').setAttribute('fill', isDark ? '#1e2535' : 'white');
  svgEl('op-label').setAttribute('fill', isDark ? '#f0d080' : '#2d3748');
  document.querySelector('#smith-svg text:first-of-type').setAttribute('fill', isDark ? '#60a5fa' : '#1a6fa8');
}

// ============================================================
// Init
// ============================================================
svgEl('in-freq').value    = '27.120';
svgEl('in-cable-m').value = '0.000';
update();
</script>
