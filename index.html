<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RF ツール</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', sans-serif;
    background: #1a1a1a;
    color: #ccc;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 24px;
  }
  .card {
    max-width: 480px;
    width: 100%;
    background: #242424;
    border: 0.5px solid #333;
    border-radius: 12px;
    padding: 40px 36px;
    line-height: 2;
    font-size: 15px;
  }
  .face {
    font-size: 18px;
    margin-bottom: 20px;
    color: #aaa;
  }
  p { margin-bottom: 12px; }
  .last {
    margin-top: 24px;
    color: #888;
    font-size: 13px;
    font-style: italic;
  }
</style>
</head>
<body>
<div class="card">
  <div class="face">やあ （´・ω・｀）</div>
  <p>ようこそ、RF ツールへ。</p>
  <p>このページはサービスだから、まず落ち着いて欲しい。</p>
  <p>うん、「コンテンツがない」んだ。済まない。</p>
  <p>仏の顔もって言うしね、謝って許してもらおうとも思っていない。</p>
  <p>でも、このサイトを見つけたとき、君は、きっと言葉では言い表せない「ときめき」みたいなものを感じてくれたと思う。</p>
  <p>殺伐とした電波の世界で、そういう気持ちを忘れないで欲しい。</p>
  <p>そう思って、このページだけ残したんだ。</p>
</div>
</body>
</html>
